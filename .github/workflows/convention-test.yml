name: CI Pipeline

on:
  push:

jobs:
  validate:
    name: Validate Branch Naming
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      
    steps:
      - name: Validate branch naming conventions
        uses: actions/github-script@v7
        with:
          script: |
            const execute = require('.github/scripts/conventional-branches.js');
            return execute({ github, context, core });