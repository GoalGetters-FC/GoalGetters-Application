name: CI Pipeline

on:
  push:

jobs:
  validate:
    name: Validate Branch Naming
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Validate branch naming
        run: node .github/scripts/conventional-branches.js