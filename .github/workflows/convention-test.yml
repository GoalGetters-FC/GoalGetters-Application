name: CI Pipeline

on:
  push:

jobs:
  validate:
    name: Validate Branch Naming
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Validate branch naming conventions
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref_name;
            if (!branch) {
              core.setFailed('Unable to determine branch name from context');
            } else {
              const result = require('./.github/scripts/conventional-branches.js')({ github, context, core });
              return result;
            }